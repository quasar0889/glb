<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxiom Butterfly Knife</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: transparent; user-select: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        /* lil-guiのフォント調整 */
        .lil-gui { --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
    <!-- Three.jsとUIツール(lil-gui)のインポート -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import GUI from 'three/addons/libs/lil-gui.module.min.js';

        // 設定の基本オブジェクト
        let config = {
            position: { x: 0.8, y: -0.6, z: -1.5 },
            rotation: { x: 0, y: Math.PI / 2, z: 0 },
            scale: 1.0,
            swayIntensity: 0.0015,
            swayRecovery: 5.0,
            animationSpeed: 1.0,
            defaultAnimation: 'idle'
        };

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
        
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 0); 
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(5, 10, 2);
        scene.add(dirLight);

        let knife, mixer;
        const actions = {};
        let currentAction = null;

        // 💡 変更をTampermonkeyに送信してセーブする関数
        const saveConfig = () => {
            window.parent.postMessage({ type: 'saveConfig', config: config }, '*');
        };

        // ===============================================
        // 🔧 限界まで調整可能なプロ仕様エディターUI (lil-gui)
        // ===============================================
        const gui = new GUI({ title: '🔪 限界設定エディター (Alt+Eで終了)' });
        gui.hide(); // 通常時は隠す

        // 1. 位置の調整パネル (0.001刻み)
        const posFolder = gui.addFolder('位置 (Position)');
        posFolder.add(config.position, 'x', -5, 5, 0.001).name('X (左右)').listen().onChange(() => { if (knife) knife.position.x = config.position.x; saveConfig(); });
        posFolder.add(config.position, 'y', -5, 5, 0.001).name('Y (上下)').listen().onChange(() => { if (knife) knife.position.y = config.position.y; saveConfig(); });
        posFolder.add(config.position, 'z', -5, 5, 0.001).name('Z (奥行き)').listen().onChange(() => { if (knife) knife.position.z = config.position.z; saveConfig(); });

        // 2. 向き(角度)の調整パネル (0.001刻み)
        const rotFolder = gui.addFolder('向き (Rotation)');
        rotFolder.add(config.rotation, 'x', -Math.PI * 2, Math.PI * 2, 0.001).name('X回転 (縦振り)').listen().onChange(() => { if (knife) knife.rotation.x = config.rotation.x; saveConfig(); });
        rotFolder.add(config.rotation, 'y', -Math.PI * 2, Math.PI * 2, 0.001).name('Y回転 (横振り)').listen().onChange(() => { if (knife) knife.rotation.y = config.rotation.y; saveConfig(); });
        rotFolder.add(config.rotation, 'z', -Math.PI * 2, Math.PI * 2, 0.001).name('Z回転 (捻り)').listen().onChange(() => { if (knife) knife.rotation.z = config.rotation.z; saveConfig(); });

        // 3. その他の調整パネル
        const miscFolder = gui.addFolder('その他 (Misc)');
        miscFolder.add(config, 'scale', 0.01, 5, 0.001).name('大きさ (Scale)').listen().onChange(() => { if (knife) knife.scale.setScalar(config.scale); saveConfig(); });
        miscFolder.add(config, 'animationSpeed', 0.1, 5, 0.01).name('アニメ再生速度').listen().onChange(saveConfig);
        miscFolder.add(config, 'swayIntensity', 0, 0.01, 0.0001).name('マウス揺れの強さ').listen().onChange(saveConfig);
        
        const loader = new GLTFLoader();
        loader.load('melee_156.glb', (gltf) => {
            knife = gltf.scene;
            knife.position.set(config.position.x, config.position.y, config.position.z);
            knife.rotation.set(config.rotation.x, config.rotation.y, config.rotation.z);
            knife.scale.setScalar(config.scale);

            camera.add(knife);
            scene.add(camera);

            if (gltf.animations && gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(knife);
                gltf.animations.forEach((clip) => { actions[clip.name] = mixer.clipAction(clip); });

                mixer.addEventListener('finished', (e) => {
                    if (e.action === currentAction && actions[config.defaultAnimation]) {
                        e.action.fadeOut(0.2);
                        actions[config.defaultAnimation].reset().fadeIn(0.2).play();
                        currentAction = actions[config.defaultAnimation];
                    }
                });

                let idleAnim = actions[config.defaultAnimation] || actions[gltf.animations[0].name];
                if (idleAnim) { idleAnim.play(); currentAction = idleAnim; }
            }
        });

        // ステート管理
        let isEditorMode = false;
        let isDragging = false;
        let previousMouse = { x: 0, y: 0 };
        let targetRotation = new THREE.Vector2(0, 0);
        let currentSway = new THREE.Vector2(0, 0);

        // 通信受信
        window.addEventListener('message', (event) => {
            const data = event.data;
            if (!data) return;

            if (data.type === 'toggleEditor') {
                isEditorMode = data.state;
                if (isEditorMode) {
                    gui.show();
                    targetRotation.set(0, 0);
                    currentSway.set(0, 0);
                    if (knife) knife.rotation.set(config.rotation.x, config.rotation.y, config.rotation.z);
                } else {
                    gui.hide();
                }
            }
            else if (data.type === 'mouseMove') {
                if (isEditorMode) return;
                targetRotation.y += data.movementX * config.swayIntensity;
                targetRotation.x += data.movementY * config.swayIntensity;
                targetRotation.x = THREE.MathUtils.clamp(targetRotation.x, -0.2, 0.2);
                targetRotation.y = THREE.MathUtils.clamp(targetRotation.y, -0.2, 0.2);
            }
            else if (data.type === 'playAnimation') {
                if (isEditorMode) return;
                const animName = data.name;
                if (mixer && actions[animName]) {
                    if (currentAction) currentAction.fadeOut(0.1);
                    const action = actions[animName];
                    action.reset().setEffectiveTimeScale(config.animationSpeed).fadeIn(0.1).play();
                    if (animName !== config.defaultAnimation) {
                        action.setLoop(THREE.LoopOnce);
                        action.clampWhenFinished = true;
                    }
                    currentAction = action;
                }
            }
            else if (data.type === 'updateConfig') {
                const c = data.config;
                // UIと紐付いているため、オブジェクトを上書きせず中身の数値を更新する
                if (c.position) { config.position.x = c.position.x; config.position.y = c.position.y; config.position.z = c.position.z; }
                if (c.rotation) { config.rotation.x = c.rotation.x; config.rotation.y = c.rotation.y; config.rotation.z = c.rotation.z; }
                if (c.scale !== undefined) config.scale = c.scale;
                if (c.swayIntensity !== undefined) config.swayIntensity = c.swayIntensity;
                if (c.swayRecovery !== undefined) config.swayRecovery = c.swayRecovery;
                if (c.animationSpeed !== undefined) config.animationSpeed = c.animationSpeed;
                
                if (knife) {
                    knife.position.set(config.position.x, config.position.y, config.position.z);
                    knife.rotation.set(config.rotation.x, config.rotation.y, config.rotation.z);
                    knife.scale.setScalar(config.scale);
                }
            }
        });

        // マウスによる直感ドラッグ操作 (UI以外の背景を触った時)
        window.addEventListener('mousedown', (e) => {
            if (!isEditorMode || e.target.closest('.lil-gui')) return;
            isDragging = true;
            previousMouse = { x: e.clientX, y: e.clientY };
        });

        window.addEventListener('mousemove', (e) => {
            if (isEditorMode && isDragging && knife) {
                const deltaX = e.clientX - previousMouse.x;
                const deltaY = e.clientY - previousMouse.y;
                config.position.x += deltaX * 0.005;
                config.position.y -= deltaY * 0.005;
                knife.position.x = config.position.x;
                knife.position.y = config.position.y;
                previousMouse = { x: e.clientX, y: e.clientY };
                saveConfig(); // UIにも連動して数値が変わる
            }
        });

        window.addEventListener('mouseup', () => { isDragging = false; });

        window.addEventListener('wheel', (e) => {
            if (!isEditorMode || !knife || e.target.closest('.lil-gui')) return;
            e.preventDefault(); 
            const delta = e.deltaY > 0 ? -1 : 1;
            if (e.shiftKey) {
                config.position.z += delta * 0.05;
                knife.position.z = config.position.z;
            } else {
                config.scale += delta * 0.02;
                config.scale = Math.max(0.1, config.scale);
                knife.scale.setScalar(config.scale);
            }
            saveConfig();
        }, { passive: false });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);F
            const delta = clock.getDelta();

            if (mixer) mixer.update(delta);

            if (knife && !isEditorMode) {
                targetRotation.lerp(new THREE.Vector2(0, 0), delta * config.swayRecovery);
                currentSway.lerp(targetRotation, delta * 15);
                knife.rotation.set(
                    config.rotation.x + currentSway.x,
                    config.rotation.y + currentSway.y,
                    config.rotation.z
                );
            }

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
