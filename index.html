<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxiom Butterfly Knife</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: transparent; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
    <!-- Three.jsのインポート -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // ==========================================
        // 🔪 モデルの精密な配置と揺れの設定
        // ==========================================
        let config = {
            position: { x: 0.8, y: -0.6, z: -1.5 }, // x:左右, y:上下, z:奥行き (ゲーム画面に合わせて微調整)
            rotation: { x: 0, y: Math.PI / 2, z: 0 }, // モデルの初期角度
            scale: 1.0,                               // モデルの大きさ
            swayIntensity: 0.0015,                    // マウスを動かしたときの揺れの強さ
            swayRecovery: 5.0,                        // 揺れが元に戻る速さ
            animationSpeed: 1.0,                      // アニメーション全体の再生速度
            defaultAnimation: 'idle'                  // 何もしていない時の待機アニメーション名（GLB内の名前に合わせる）
        };

        const scene = new THREE.Scene();
        // FPSの標準的な視野角(FOV:75)
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
        
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 0); // 背景を完全に透明化
        document.body.appendChild(renderer.domElement);

        // ゲーム内の環境に合わせたライティング
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(5, 10, 2);
        scene.add(dirLight);

        let knife, mixer;
        const actions = {};
        let currentAction = null;

        const loader = new GLTFLoader();
        loader.load('melee_156.glb', (gltf) => {
            knife = gltf.scene;
            
            knife.position.set(config.position.x, config.position.y, config.position.z);
            knife.rotation.set(config.rotation.x, config.rotation.y, config.rotation.z);
            knife.scale.setScalar(config.scale);

            // カメラの子要素にすることで、視点移動時に常に画面の定位置（FPS視点）に固定される
            camera.add(knife);
            scene.add(camera);

            if (gltf.animations && gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(knife);
                gltf.animations.forEach((clip) => {
                    actions[clip.name] = mixer.clipAction(clip);
                });

                // アニメーション終了時の処理（再生が終わったら待機状態に戻る）
                mixer.addEventListener('finished', (e) => {
                    if (e.action === currentAction && actions[config.defaultAnimation]) {
                        e.action.fadeOut(0.2);
                        actions[config.defaultAnimation].reset().fadeIn(0.2).play();
                        currentAction = actions[config.defaultAnimation];
                    }
                });

                // 初期アニメーション再生
                let idleAnim = actions[config.defaultAnimation] || actions[gltf.animations[0].name];
                if (idleAnim) {
                    idleAnim.play();
                    currentAction = idleAnim;
                }
            }
        });

        // 揺れ（Sway）の計算用ベクトル
        let targetRotation = new THREE.Vector2(0, 0);
        let currentSway = new THREE.Vector2(0, 0);

        // 親(Tampermonkey)からの指示を受信
        window.addEventListener('message', (event) => {
            const data = event.data;
            if (!data) return;

            if (data.type === 'mouseMove') {
                // マウスの移動量に応じて目標の角度を傾ける
                targetRotation.y += data.movementX * config.swayIntensity;
                targetRotation.x += data.movementY * config.swayIntensity;
                
                // 傾きの限界値を設定（武器が画面外に飛び出さないように）
                targetRotation.x = THREE.MathUtils.clamp(targetRotation.x, -0.2, 0.2);
                targetRotation.y = THREE.MathUtils.clamp(targetRotation.y, -0.2, 0.2);
            }
            else if (data.type === 'playAnimation') {
                const animName = data.name;
                if (mixer && actions[animName]) {
                    if (currentAction) currentAction.fadeOut(0.1);
                    const action = actions[animName];
                    action.reset().setEffectiveTimeScale(config.animationSpeed).fadeIn(0.1).play();
                    
                    // 待機以外のアニメーションは1回だけ再生して止める
                    if (animName !== config.defaultAnimation) {
                        action.setLoop(THREE.LoopOnce);
                        action.clampWhenFinished = true;
                    }
                    currentAction = action;
                }
            }
            else if (data.type === 'updateConfig') {
                Object.assign(config, data.config);
                if (knife) {
                    knife.position.set(config.position.x, config.position.y, config.position.z);
                }
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (mixer) mixer.update(delta);

            if (knife) {
                // マウスが止まったら徐々に揺れをゼロ（中央）に戻す
                targetRotation.lerp(new THREE.Vector2(0, 0), delta * config.swayRecovery);
                // 実際のモデルの傾きを滑らかに追従させる
                currentSway.lerp(targetRotation, delta * 15);

                knife.rotation.set(
                    config.rotation.x + currentSway.x,
                    config.rotation.y + currentSway.y,
                    config.rotation.z
                );
            }

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
