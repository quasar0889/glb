<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Voxiom Interactive Overlay</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: transparent; user-select: none; }
        model-viewer { width: 100%; height: 100%; background-color: transparent; }
    </style>
</head>
<body>

<model-viewer id="mv" src="melee_156.glb" autoplay shadow-intensity="1" 
    camera-orbit="0deg 90deg 2m" camera-target="0m 0m 0m" field-of-view="30deg">
</model-viewer>

<script>
    const mv = document.querySelector("#mv");
    let config = { posX: 0, posY: 0, posZ: 0, theta: 0, phi: 90, fov: 30, speed: 1, scale: 1 };
    let isDragging = false;
    let lastMouseX, lastMouseY;

    // 親ウィンドウへ現在の設定を送信する関数
    function syncToParent() {
        window.parent.postMessage({ type: 'sync', config: config }, "*");
    }

    // マウス操作による直感的な変更
    window.addEventListener('mousedown', (e) => {
        if (e.button === 0 || e.button === 2) { // 左または右クリック
            isDragging = true;
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
        }
    });

    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const deltaX = e.clientX - lastMouseX;
        const deltaY = e.clientY - lastMouseY;

        if (e.buttons === 1) { // 左クリックドラッグ：位置(X, Y)移動
            config.posX += deltaX * 0.005;
            config.posY -= deltaY * 0.005;
        } else if (e.buttons === 2) { // 右クリックドラッグ：回転
            config.theta -= deltaX * 0.5;
            config.phi += deltaY * 0.5;
        }

        lastMouseX = e.clientX;
        lastMouseY = e.clientY;
        applyConfig();
        syncToParent();
    });

    window.addEventListener('mouseup', () => isDragging = false);
    window.addEventListener('contextmenu', e => e.preventDefault()); // 右クリックメニュー禁止

    // ホイール操作：サイズ(Scale)変更
    window.addEventListener('wheel', (e) => {
        const delta = e.deltaY > 0 ? -0.05 : 0.05;
        config.scale = Math.max(0.01, config.scale + delta);
        applyConfig();
        syncToParent();
    }, { passive: false });

    function applyConfig() {
        mv.cameraTarget = `${config.posX}m ${config.posY}m ${config.posZ}m`;
        mv.cameraOrbit = `${config.theta}deg ${config.phi}deg 2m`;
        mv.scale = `${config.scale} ${config.scale} ${config.scale}`;
        mv.fieldOfView = `${config.fov}deg`;
        mv.timeScale = config.speed;
    }

    window.addEventListener("message", (event) => {
        if (event.data.type === "config") {
            config = {
                posX: event.data.posX, posY: event.data.posY, posZ: event.data.posZ,
                theta: event.data.orbitTheta, phi: event.data.orbitPhi,
                fov: event.data.fov, speed: event.data.speed, scale: event.data.scale
            };
            applyConfig();
        }
        if (event.data.type === "action") {
            const anims = mv.availableAnimations;
            if (event.data.action === "attack") mv.animationName = anims[0] || null;
            else if (event.data.action === "inspect") mv.animationName = anims[1] || anims[0];
            mv.play({ repetitions: 1 });
        }
    });
</script>
</body>
</html>
