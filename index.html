<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>GLB Viewer Editor</title>
  <style>
    body { margin: 0; overflow: hidden; }
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 10px;
      font-family: sans-serif;
      border-radius: 8px;
    }
    input { width: 100px; }
  </style>
</head>
<body>

<div id="ui">
  <div>位置 X: <input id="posX" type="range" min="-5" max="5" step="0.1"></div>
  <div>位置 Y: <input id="posY" type="range" min="-5" max="5" step="0.1"></div>
  <div>位置 Z: <input id="posZ" type="range" min="-5" max="5" step="0.1"></div>

  <div>回転 X: <input id="rotX" type="range" min="0" max="6.28" step="0.01"></div>
  <div>回転 Y: <input id="rotY" type="range" min="0" max="6.28" step="0.01"></div>
  <div>回転 Z: <input id="rotZ" type="range" min="0" max="6.28" step="0.01"></div>

  <div>スケール: <input id="scale" type="range" min="0.1" max="3" step="0.1" value="1"></div>
  <div>アニメ速度: <input id="speed" type="range" min="0" max="3" step="0.1" value="1"></div>
</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/loaders/GLTFLoader.js';

let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer({antialias:true});

renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

let light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,5,5);
scene.add(light);

camera.position.z = 5;

let mixer;
let model;

const loader = new GLTFLoader();
loader.load('melee_156.glb', (gltf) => {
  model = gltf.scene;
  scene.add(model);

  if (gltf.animations.length) {
    mixer = new THREE.AnimationMixer(model);
    gltf.animations.forEach((clip) => {
      mixer.clipAction(clip).play();
    });
  }
});

let clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  if (mixer) {
    let speed = document.getElementById("speed").value;
    mixer.update(clock.getDelta() * speed);
  }

  if (model) {
    model.position.set(
      posX.value,
      posY.value,
      posZ.value
    );

    model.rotation.set(
      rotX.value,
      rotY.value,
      rotZ.value
    );

    model.scale.setScalar(scale.value);
  }

  renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
