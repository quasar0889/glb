<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Voxiom Advanced Overlay</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: transparent; }
        model-viewer { width: 100%; height: 100%; background-color: transparent; --poster-color: transparent; }
    </style>
</head>
<body>

<model-viewer id="mv" src="melee_156.glb" autoplay shadow-intensity="1" 
    camera-orbit="0deg 90deg 2m" camera-target="0m 0m 0m" field-of-view="30deg">
</model-viewer>

<script>
    const mv = document.querySelector("#mv");
    let config = { posX: 0, posY: 0, posZ: 0, orbitTheta: 0, orbitPhi: 90, fov: 30, speed: 1, scale: 1 };
    let isWalking = false;
    let swayTime = 0;

    function updateSway() {
        if (!mv.loaded) { requestAnimationFrame(updateSway); return; }
        let targetX = config.posX;
        let targetY = config.posY;
        if (isWalking) {
            swayTime += 0.15;
            targetX += Math.sin(swayTime) * 0.05;
            targetY += Math.abs(Math.cos(swayTime)) * 0.03;
        } else {
            swayTime += 0.02;
            targetY += Math.sin(swayTime) * 0.01;
        }
        mv.cameraTarget = `${targetX}m ${targetY}m ${config.posZ}m`;
        requestAnimationFrame(updateSway);
    }
    updateSway();

    window.addEventListener("message", (event) => {
        const d = event.data;
        if (d.type === "config") {
            config = d;
            mv.cameraOrbit = `${d.orbitTheta}deg ${d.orbitPhi}deg 2m`;
            mv.fieldOfView = `${d.fov}deg`;
            mv.timeScale = d.speed;
            // スケール（大きさ）の変更を追加
            mv.scale = `${d.scale} ${d.scale} ${d.scale}`;
        }
        if (d.type === "action") {
            const anims = mv.availableAnimations;
            if (d.action === "attack") mv.animationName = anims[0] || null;
            else if (d.action === "inspect") mv.animationName = anims[1] || anims[0];
            mv.play({ repetitions: 1 });
        }
        if (d.type === "state") isWalking = d.isWalking;
    });
</script>
</body>
</html>
