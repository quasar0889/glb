<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxiom Butterfly Knife</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: transparent; user-select: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        /* エディター用のUIデザイン */
        #editor-ui {
            display: none;
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(15, 20, 25, 0.85);
            color: #fff;
            padding: 20px;
            border-radius: 12px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
            pointer-events: none; /* UIの奥の画面もドラッグできるように貫通させる */
        }
        #editor-ui h3 { margin: 0 0 15px 0; font-size: 18px; color: #4ade80; }
        #editor-ui p { margin: 8px 0; font-size: 14px; }
        .key { background: #333; padding: 2px 6px; border-radius: 4px; font-family: monospace; border: 1px solid #555; }
        hr { border: none; border-top: 1px solid rgba(255,255,255,0.2); margin: 15px 0; }
        #editor-values { font-family: monospace; font-size: 15px; color: #93c5fd; line-height: 1.5; }
    </style>
    <!-- Three.jsのインポート -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <!-- エディター画面 -->
    <div id="editor-ui">
        <h3>🔧 直感エディターモード</h3>
        <p><span class="key">ドラッグ</span> : 位置の移動 (X, Y)</p>
        <p><span class="key">スクロール</span> : 大きさの変更 (Scale)</p>
        <p><span class="key">Shift</span> + <span class="key">スクロール</span> : 奥行きの変更 (Z)</p>
        <p><span class="key">Alt</span> + <span class="key">E</span> : 保存して通常モードへ戻る</p>
        <hr>
        <div id="editor-values"></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // 内部設定
        let config = {
            position: { x: 0.8, y: -0.6, z: -1.5 },
            rotation: { x: 0, y: Math.PI / 2, z: 0 },
            scale: 1.0,
            swayIntensity: 0.0015,
            swayRecovery: 5.0,
            animationSpeed: 1.0,
            defaultAnimation: 'idle'
        };

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
        
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 0); 
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(5, 10, 2);
        scene.add(dirLight);

        let knife, mixer;
        const actions = {};
        let currentAction = null;

        const loader = new GLTFLoader();
        loader.load('melee_156.glb', (gltf) => {
            knife = gltf.scene;
            knife.position.set(config.position.x, config.position.y, config.position.z);
            knife.rotation.set(config.rotation.x, config.rotation.y, config.rotation.z);
            knife.scale.setScalar(config.scale);

            camera.add(knife);
            scene.add(camera);

            if (gltf.animations && gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(knife);
                gltf.animations.forEach((clip) => {
                    actions[clip.name] = mixer.clipAction(clip);
                });

                mixer.addEventListener('finished', (e) => {
                    if (e.action === currentAction && actions[config.defaultAnimation]) {
                        e.action.fadeOut(0.2);
                        actions[config.defaultAnimation].reset().fadeIn(0.2).play();
                        currentAction = actions[config.defaultAnimation];
                    }
                });

                let idleAnim = actions[config.defaultAnimation] || actions[gltf.animations[0].name];
                if (idleAnim) {
                    idleAnim.play();
                    currentAction = idleAnim;
                }
            }
        });

        // --- エディター機能とステート ---
        let isEditorMode = false;
        let isDragging = false;
        let previousMouse = { x: 0, y: 0 };
        
        const uiElement = document.getElementById('editor-ui');
        const valuesElement = document.getElementById('editor-values');

        function updateUI() {
            valuesElement.innerHTML = `
                X: ${config.position.x.toFixed(3)}<br>
                Y: ${config.position.y.toFixed(3)}<br>
                Z: ${config.position.z.toFixed(3)}<br>
                Scale: ${config.scale.toFixed(3)}
            `;
            // 親(Tampermonkey)に変更された値を送信してローカルストレージに保存させる
            window.parent.postMessage({ 
                type: 'saveConfig', 
                config: { position: config.position, scale: config.scale } 
            }, '*');
        }

        let targetRotation = new THREE.Vector2(0, 0);
        let currentSway = new THREE.Vector2(0, 0);

        // 親からの通信を受信
        window.addEventListener('message', (event) => {
            const data = event.data;
            if (!data) return;

            if (data.type === 'toggleEditor') {
                isEditorMode = data.state;
                uiElement.style.display = isEditorMode ? 'block' : 'none';
                if (isEditorMode) {
                    updateUI(); // エディター起動時にUIを更新
                    targetRotation.set(0, 0); // エディター中は揺れをリセット
                    currentSway.set(0, 0);
                    if (knife) knife.rotation.set(config.rotation.x, config.rotation.y, config.rotation.z);
                }
            }
            else if (data.type === 'mouseMove') {
                if (isEditorMode) return; // エディター中は揺らさない
                targetRotation.y += data.movementX * config.swayIntensity;
                targetRotation.x += data.movementY * config.swayIntensity;
                targetRotation.x = THREE.MathUtils.clamp(targetRotation.x, -0.2, 0.2);
                targetRotation.y = THREE.MathUtils.clamp(targetRotation.y, -0.2, 0.2);
            }
            else if (data.type === 'playAnimation') {
                if (isEditorMode) return; // エディター中はアニメーションしない
                const animName = data.name;
                if (mixer && actions[animName]) {
                    if (currentAction) currentAction.fadeOut(0.1);
                    const action = actions[animName];
                    action.reset().setEffectiveTimeScale(config.animationSpeed).fadeIn(0.1).play();
                    if (animName !== config.defaultAnimation) {
                        action.setLoop(THREE.LoopOnce);
                        action.clampWhenFinished = true;
                    }
                    currentAction = action;
                }
            }
            else if (data.type === 'updateConfig') {
                if (data.config.position) {
                    config.position.x = data.config.position.x;
                    config.position.y = data.config.position.y;
                    config.position.z = data.config.position.z;
                }
                if (data.config.scale !== undefined) config.scale = data.config.scale;
                
                if (knife) {
                    knife.position.set(config.position.x, config.position.y, config.position.z);
                    knife.scale.setScalar(config.scale);
                }
            }
        });

        // --- マウスによる直感的なエディット操作 ---
        window.addEventListener('mousedown', (e) => {
            if (!isEditorMode) return;
            isDragging = true;
            previousMouse = { x: e.clientX, y: e.clientY };
        });

        window.addEventListener('mousemove', (e) => {
            if (isEditorMode && isDragging && knife) {
                const deltaX = e.clientX - previousMouse.x;
                const deltaY = e.clientY - previousMouse.y;
                
                // ドラッグ量に応じて位置を移動 (感度はここで調整)
                config.position.x += deltaX * 0.005;
                config.position.y -= deltaY * 0.005;
                
                knife.position.x = config.position.x;
                knife.position.y = config.position.y;
                
                previousMouse = { x: e.clientX, y: e.clientY };
                updateUI();
            }
        });

        window.addEventListener('mouseup', () => { isDragging = false; });

        window.addEventListener('wheel', (e) => {
            if (!isEditorMode || !knife) return;
            e.preventDefault(); // スクロールによる画面移動を防ぐ
            
            const delta = e.deltaY > 0 ? -1 : 1;
            
            if (e.shiftKey) {
                // Shift+スクロールで奥行き(Z軸)を調整
                config.position.z += delta * 0.05;
                knife.position.z = config.position.z;
            } else {
                // 通常スクロールで大きさ(Scale)を調整
                config.scale += delta * 0.02;
                config.scale = Math.max(0.1, config.scale); // マイナスにならないように
                knife.scale.setScalar(config.scale);
            }
            updateUI();
        }, { passive: false });


        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (mixer) mixer.update(delta);

            if (knife && !isEditorMode) {
                targetRotation.lerp(new THREE.Vector2(0, 0), delta * config.swayRecovery);
                currentSway.lerp(targetRotation, delta * 15);
                knife.rotation.set(
                    config.rotation.x + currentSway.x,
                    config.rotation.y + currentSway.y,
                    config.rotation.z
                );
            }

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
