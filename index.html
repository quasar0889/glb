<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxiom Butterfly Knife</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: transparent; user-select: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        .lil-gui { --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm"
            }
        }
    </script>
</head>
<body>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import GUI from 'lil-gui';

        let config = {
            position: { x: 0.8, y: -0.6, z: -1.5 },
            rotation: { x: 0, y: Math.PI / 2, z: 0 },
            scale: 1.0,
            swayIntensity: 0.0015,
            swayRecovery: 5.0,
            animationSpeed: 1.0,
            defaultAnimation: 'idle',
            keyBinds: {
                anim1Key: 'KeyF', anim1Name: 'inspect',
                anim2Key: 'Click', anim2Name: 'attack',
                anim3Key: '', anim3Name: ''
            }
        };

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
        
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 0); 
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(5, 10, 2);
        scene.add(dirLight);

        let knife, mixer;
        const actions = {};
        let currentAction = null;

        const saveConfig = () => {
            window.parent.postMessage({ type: 'saveConfig', config: config }, '*');
        };

        const gui = new GUI({ title: '🔪 限界設定エディター (Alt+Eで終了)' });
        gui.hide();

        const posFolder = gui.addFolder('位置 (Position)');
        posFolder.add(config.position, 'x', -5, 5, 0.001).name('X (左右)').listen().onChange(() => { if (knife) knife.position.x = config.position.x; saveConfig(); });
        posFolder.add(config.position, 'y', -5, 5, 0.001).name('Y (上下)').listen().onChange(() => { if (knife) knife.position.y = config.position.y; saveConfig(); });
        posFolder.add(config.position, 'z', -5, 5, 0.001).name('Z (奥行き)').listen().onChange(() => { if (knife) knife.position.z = config.position.z; saveConfig(); });

        const rotFolder = gui.addFolder('向き (Rotation)');
        rotFolder.add(config.rotation, 'x', -Math.PI * 2, Math.PI * 2, 0.001).name('X回転').listen().onChange(() => { if (knife) knife.rotation.x = config.rotation.x; saveConfig(); });
        rotFolder.add(config.rotation, 'y', -Math.PI * 2, Math.PI * 2, 0.001).name('Y回転').listen().onChange(() => { if (knife) knife.rotation.y = config.rotation.y; saveConfig(); });
        rotFolder.add(config.rotation, 'z', -Math.PI * 2, Math.PI * 2, 0.001).name('Z回転').listen().onChange(() => { if (knife) knife.rotation.z = config.rotation.z; saveConfig(); });

        const keyFolder = gui.addFolder('キー割り当て');
        keyFolder.add(config.keyBinds, 'anim1Key').name('キー枠1 (例: KeyF)').listen().onChange(saveConfig);
        keyFolder.add(config.keyBinds, 'anim1Name').name('└ アニメ名').listen().onChange(saveConfig);
        keyFolder.add(config.keyBinds, 'anim2Key').name('キー枠2 (例: Click)').listen().onChange(saveConfig);
        keyFolder.add(config.keyBinds, 'anim2Name').name('└ アニメ名').listen().onChange(saveConfig);
        keyFolder.add(config.keyBinds, 'anim3Key').name('キー枠3').listen().onChange(saveConfig);
        keyFolder.add(config.keyBinds, 'anim3Name').name('└ アニメ名').listen().onChange(saveConfig);

        const miscFolder = gui.addFolder('その他 (Misc)');
        miscFolder.add(config, 'scale', 0.01, 5, 0.001).name('大きさ').listen().onChange(() => { if (knife) knife.scale.setScalar(config.scale); saveConfig(); });
        
        // 💡 修正箇所1: アニメーション速度をスライダーを動かした瞬間に全体へ反映させる
        miscFolder.add(config, 'animationSpeed', 0.1, 5, 0.01).name('アニメ速度').listen().onChange((v) => { 
            if (mixer) mixer.timeScale = v; 
            saveConfig(); 
        });

        miscFolder.add(config, 'swayIntensity', 0, 0.01, 0.0001).name('揺れの強さ').listen().onChange(saveConfig);
        
        // 💡 おまけ修正: 待機アニメ名をエディターで変更した瞬間、リアルタイムに切り替わるようにしました
        miscFolder.add(config, 'defaultAnimation').name('待機時のアニメ名').listen().onChange((v) => {
            if (mixer && actions[v]) {
                if (currentAction) currentAction.fadeOut(0.2);
                const action = actions[v];
                action.reset().fadeIn(0.2).play();
                currentAction = action;
            }
            saveConfig();
        });
        
        const resetObj = { reset: () => { if (confirm("設定を全て初期化しますか？")) window.parent.postMessage({ type: 'resetConfig' }, '*'); } };
        gui.add(resetObj, 'reset').name('⚠️ 全て初期化');

        const loader = new GLTFLoader();
        loader.load('melee_156.glb', (gltf) => {
            knife = gltf.scene;
            knife.position.set(config.position.x, config.position.y, config.position.z);
            knife.rotation.set(config.rotation.x, config.rotation.y, config.rotation.z);
            knife.scale.setScalar(config.scale);

            camera.add(knife);
            scene.add(camera);

            if (gltf.animations && gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(knife);
                
                // 💡 修正箇所2: 初期化時にも全体の速度を設定
                mixer.timeScale = config.animationSpeed; 
                
                gltf.animations.forEach((clip) => { actions[clip.name] = mixer.clipAction(clip); });

                mixer.addEventListener('finished', (e) => {
                    if (e.action === currentAction && actions[config.defaultAnimation]) {
                        e.action.fadeOut(0.2);
                        actions[config.defaultAnimation].reset().fadeIn(0.2).play();
                        currentAction = actions[config.defaultAnimation];
                    }
                });

                let idleAnim = actions[config.defaultAnimation] || actions[gltf.animations[0].name];
                if (idleAnim) { idleAnim.play(); currentAction = idleAnim; }
            }
        });

        let isEditorMode = false;
        let isDragging = false;
        let previousMouse = { x: 0, y: 0 };
        let targetRotation = new THREE.Vector2(0, 0);
        let currentSway = new THREE.Vector2(0, 0);

        window.addEventListener('message', (event) => {
            const data = event.data;
            if (!data) return;

            if (data.type === 'toggleEditor') {
                isEditorMode = data.state;
                if (isEditorMode) {
                    gui.show();
                    targetRotation.set(0, 0);
                    currentSway.set(0, 0);
                    if (knife) knife.rotation.set(config.rotation.x, config.rotation.y, config.rotation.z);
                } else {
                    gui.hide();
                }
            }
            else if (data.type === 'mouseMove') {
                if (isEditorMode) return;
                targetRotation.y += data.movementX * config.swayIntensity;
                targetRotation.x += data.movementY * config.swayIntensity;
                targetRotation.x = THREE.MathUtils.clamp(targetRotation.x, -0.2, 0.2);
                targetRotation.y = THREE.MathUtils.clamp(targetRotation.y, -0.2, 0.2);
            }
            else if (data.type === 'input') {
                if (isEditorMode) return;
                const inputCode = data.code;
                
                let targetAnim = null;
                if (config.keyBinds.anim1Key === inputCode) targetAnim = config.keyBinds.anim1Name;
                else if (config.keyBinds.anim2Key === inputCode) targetAnim = config.keyBinds.anim2Name;
                else if (config.keyBinds.anim3Key === inputCode) targetAnim = config.keyBinds.anim3Name;

                if (targetAnim && mixer && actions[targetAnim]) {
                    if (currentAction) currentAction.fadeOut(0.1);
                    const action = actions[targetAnim];
                    
                    // 💡 修正箇所3: 再生ごとに個別の速度を上書きする処理を削除し、グローバル速度を優先
                    action.reset().fadeIn(0.1).play();
                    
                    if (targetAnim !== config.defaultAnimation) {
                        action.setLoop(THREE.LoopOnce);
                        action.clampWhenFinished = true;
                    }
                    currentAction = action;
                }
            }
            else if (data.type === 'updateConfig') {
                const c = data.config;
                if (c.position) Object.assign(config.position, c.position);
                if (c.rotation) Object.assign(config.rotation, c.rotation);
                if (c.keyBinds) Object.assign(config.keyBinds, c.keyBinds);
                if (c.scale !== undefined) config.scale = c.scale;
                if (c.swayIntensity !== undefined) config.swayIntensity = c.swayIntensity;
                if (c.swayRecovery !== undefined) config.swayRecovery = c.swayRecovery;
                if (c.defaultAnimation !== undefined) config.defaultAnimation = c.defaultAnimation;
                
                // 💡 修正箇所4: 設定受信時にも全体の速度を更新
                if (c.animationSpeed !== undefined) {
                    config.animationSpeed = c.animationSpeed;
                    if (mixer) mixer.timeScale = config.animationSpeed;
                }
                
                if (knife) {
                    knife.position.set(config.position.x, config.position.y, config.position.z);
                    knife.rotation.set(config.rotation.x, config.rotation.y, config.rotation.z);
                    knife.scale.setScalar(config.scale);
                }
            }
        });

        window.addEventListener('mousedown', (e) => {
            if (!isEditorMode || e.target.closest('.lil-gui')) return;
            isDragging = true;
            previousMouse = { x: e.clientX, y: e.clientY };
        });

        window.addEventListener('mousemove', (e) => {
            if (isEditorMode && isDragging && knife) {
                const deltaX = e.clientX - previousMouse.x;
                const deltaY = e.clientY - previousMouse.y;
                config.position.x += deltaX * 0.005;
                config.position.y -= deltaY * 0.005;
                knife.position.x = config.position.x;
                knife.position.y = config.position.y;
                previousMouse = { x: e.clientX, y: e.clientY };
                saveConfig(); 
            }
        });

        window.addEventListener('mouseup', () => { isDragging = false; });

        window.addEventListener('wheel', (e) => {
            if (!isEditorMode || !knife || e.target.closest('.lil-gui')) return;
            e.preventDefault(); 
            const delta = e.deltaY > 0 ? -1 : 1;
            if (e.shiftKey) {
                config.position.z += delta * 0.05;
                knife.position.z = config.position.z;
            } else {
                config.scale += delta * 0.02;
                config.scale = Math.max(0.1, config.scale);
                knife.scale.setScalar(config.scale);
            }
            saveConfig();
        }, { passive: false });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (mixer) mixer.update(delta);

            if (knife && !isEditorMode) {
                targetRotation.lerp(new THREE.Vector2(0, 0), delta * config.swayRecovery);
                currentSway.lerp(targetRotation, delta * 15);
                knife.rotation.set(
                    config.rotation.x + currentSway.x,
                    config.rotation.y + currentSway.y,
                    config.rotation.z
                );
            }

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
