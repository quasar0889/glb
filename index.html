<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Voxiom Pro-FPS Overlay</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: transparent; user-select: none; }
        model-viewer { width: 100%; height: 100%; background-color: transparent; --poster-color: transparent; }
    </style>
</head>
<body>

<!-- shadow-intensity="0" で影を削除 -->
<model-viewer id="mv" src="melee_156.glb" autoplay shadow-intensity="0" 
    camera-orbit="0deg 90deg 2m" camera-target="0m 0m 0m" field-of-view="30deg">
</model-viewer>

<script>
    const mv = document.querySelector("#mv");
    let config = { posX: 0, posY: 0, posZ: 0, theta: 0, phi: 90, fov: 30, speed: 1, scale: 1 };
    
    // スウェイ（揺れ）用変数
    let mouseDeltaX = 0;
    let mouseDeltaY = 0;
    let currentSwayX = 0;
    let currentSwayY = 0;
    let currentRotationZ = 0; // 傾き
    let isWalking = false;
    let swayTime = 0;

    const lerp = (start, end, amt) => (1 - amt) * start + amt * end;

    function update() {
        if (!mv.loaded) { requestAnimationFrame(update); return; }

        // マウスの動きによる慣性（Lerpで滑らかにする）
        currentSwayX = lerp(currentSwayX, mouseDeltaX * 0.0005, 0.1);
        currentSwayY = lerp(currentSwayY, mouseDeltaY * 0.0005, 0.1);
        currentRotationZ = lerp(currentRotationZ, mouseDeltaX * 0.2, 0.1);

        // 基本の位置
        let targetX = config.posX - currentSwayX;
        let targetY = config.posY + currentSwayY;

        // 歩行時の揺れ（Bobbing）
        if (isWalking) {
            swayTime += 0.15;
            targetX += Math.sin(swayTime) * 0.03;
            targetY += Math.abs(Math.cos(swayTime)) * 0.02;
        } else {
            swayTime += 0.02;
            targetY += Math.sin(swayTime) * 0.005;
        }

        // 反映
        mv.cameraTarget = `${targetX}m ${targetY}m ${config.posZ}m`;
        // 視点移動時にモデルを少し傾ける（thetaにcurrentRotationZを加算して調整も可）
        mv.cameraOrbit = `${config.theta + (currentRotationZ * 0.5)}deg ${config.phi}deg 2m`;
        
        // デルタを減衰させる（マウスが止まったら戻るように）
        mouseDeltaX *= 0.9;
        mouseDeltaY *= 0.9;

        requestAnimationFrame(update);
    }
    update();

    window.addEventListener("message", (event) => {
        const d = event.data;
        if (d.type === "mouseMove") {
            mouseDeltaX = d.dx;
            mouseDeltaY = d.dy;
        }
        if (d.type === "config") {
            config = { 
                posX: d.posX, posY: d.posY, posZ: d.posZ, 
                theta: d.orbitTheta, phi: d.orbitPhi, 
                fov: d.fov, speed: d.speed, scale: d.scale 
            };
            mv.scale = `${d.scale} ${d.scale} ${d.scale}`;
            mv.fieldOfView = `${d.fov}deg`;
        }
        if (d.type === "action") {
            const anims = mv.availableAnimations;
            if (d.action === "attack") mv.animationName = anims[0] || null;
            else if (d.action === "inspect") mv.animationName = anims[1] || anims[0];
            mv.play({ repetitions: 1 });
        }
        if (d.type === "state") isWalking = d.isWalking;
    });
</script>
</body>
</html>
