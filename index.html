<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Voxiom Overlay Provider</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        /* 背景を完全に透明にする */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: transparent; }
        model-viewer {
            width: 100%;
            height: 100%;
            background-color: transparent; /* 背景透過 */
            --poster-color: transparent;
        }
        /* エディターUIは必要な時だけ表示（Shift+Eなどで制御される） */
        .sidebar {
            position: fixed; right: 10px; top: 10px; width: 280px; 
            background: rgba(0,0,0,0.8); color: white; padding: 15px;
            border-radius: 8px; display: none; /* 初期は非表示 */
            font-family: sans-serif; pointer-events: auto;
        }
    </style>
</head>
<body>

<model-viewer id="mv" src="melee_156.glb" camera-controls autoplay shadow-intensity="1">
</model-viewer>

<div class="sidebar" id="ui">
    <h3 style="margin:0 0 10px 0">Knife Editor</h3>
    <button onclick="document.getElementById('ui').style.display='none'">Close & Lock</button>
</div>

<script>
    const mv = document.querySelector("#mv");
    
    // 親ウィンドウ（スクリプト）からの命令を受け取る
    window.addEventListener("message", (event) => {
        if (event.data === "showUI") {
            document.getElementById('ui').style.display = 'block';
        }
        // 他のアニメーション変更命令などもここに追加可能
    });
</script>
</body>
</html>
