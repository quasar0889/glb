<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>GLB Editor</title>
  <style>
    body { margin: 0; overflow: hidden; }
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 10px;
      font-family: sans-serif;
      border-radius: 8px;
    }
    input { width: 120px; }
  </style>
</head>
<body>

<div id="ui">
  <div>位置 X: <input id="posX" type="range" min="-10" max="10" step="0.1" value="0"></div>
  <div>位置 Y: <input id="posY" type="range" min="-10" max="10" step="0.1" value="0"></div>
  <div>位置 Z: <input id="posZ" type="range" min="-10" max="10" step="0.1" value="0"></div>

  <div>回転 X: <input id="rotX" type="range" min="0" max="6.28" step="0.01" value="0"></div>
  <div>回転 Y: <input id="rotY" type="range" min="0" max="6.28" step="0.01" value="0"></div>
  <div>回転 Z: <input id="rotZ" type="range" min="0" max="6.28" step="0.01" value="0"></div>

  <div>スケール: <input id="scale" type="range" min="0.01" max="5" step="0.01" value="1"></div>
  <div>アニメ速度: <input id="speed" type="range" min="0" max="3" step="0.1" value="1"></div>
</div>

<!-- Three.js（グローバル版） -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160/build/three.min.js"></script>

<!-- GLTFLoader -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160/examples/js/loaders/GLTFLoader.js"></script>

<!-- DRACO（圧縮対応） -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160/examples/js/libs/draco/draco_decoder.js"></script>

<script>
let scene = new THREE.Scene();
scene.background = new THREE.Color(0x222222);

let camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 1, 5);

let renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ライト
scene.add(new THREE.AmbientLight(0xffffff, 2));
const dirLight = new THREE.DirectionalLight(0xffffff, 1);
dirLight.position.set(5, 5, 5);
scene.add(dirLight);

// リサイズ対応
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

let mixer;
let model;

const loader = new THREE.GLTFLoader();

// 🔥 GLB読み込み
loader.load(
  'melee_156.glb',

  function (gltf) {
    console.log("読み込み成功");

    model = gltf.scene;

    // 中心補正
    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    model.position.sub(center);

    scene.add(model);

    // アニメーション
    if (gltf.animations.length > 0) {
      mixer = new THREE.AnimationMixer(model);
      gltf.animations.forEach(function (clip) {
        mixer.clipAction(clip).play();
      });
    }
  },

  function (progress) {
    console.log((progress.loaded / progress.total * 100) + '% loaded');
  },

  function (error) {
    console.error("読み込みエラー:", error);
  }
);

let clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  if (mixer) {
    const speed = document.getElementById("speed").value;
    mixer.update(clock.getDelta() * speed);
  }

  if (model) {
    model.position.set(
      parseFloat(posX.value),
      parseFloat(posY.value),
      parseFloat(posZ.value)
    );

    model.rotation.set(
      parseFloat(rotX.value),
      parseFloat(rotY.value),
      parseFloat(rotZ.value)
    );

    const s = parseFloat(scale.value);
    model.scale.set(s, s, s);
  }

  renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
