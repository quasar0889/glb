<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; overflow: hidden; background: transparent; }
        canvas { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script>
        let scene, camera, renderer, model, container;
        let targetX = 0, targetY = 0; // マウス追従用
        let bobTick = 0; // 歩き揺れ用
        let isMoving = false;

        function init() {
            scene = new THREE.Scene();
            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setClearColor(0x000000, 0);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            const ambient = new THREE.AmbientLight(0xffffff, 1.2);
            scene.add(ambient);
            const sun = new THREE.DirectionalLight(0xffffff, 0.6);
            sun.position.set(5, 10, 5);
            scene.add(sun);

            container = new THREE.Group(); // 揺れを制御するための親
            scene.add(container);

            const urlParams = new URLSearchParams(window.location.search);
            const glbUrl = urlParams.get('glb');

            if (glbUrl) {
                new THREE.GLTFLoader().load(glbUrl, (gltf) => {
                    model = gltf.scene;
                    container.add(model);
                    animate();
                });
            }
        }

        window.addEventListener('message', (e) => {
            const d = e.data;
            if (d.type === 'input') {
                // マウス移動によるスウェイ（慣性）
                targetX = d.mx * 0.001; 
                targetY = d.my * 0.001;
                isMoving = d.moving;
            }
            if (d.type === 'transform' && model) {
                model.position.set(d.x, d.y, d.z);
                model.rotation.set(d.rx, d.ry, d.rz);
                model.scale.set(d.s, d.s, d.s);
            }
            if (d.type === 'visibility' && model) {
                model.visible = d.visible;
            }
        });

        function animate() {
            requestAnimationFrame(animate);

            if (model) {
                // 1. スウェイ（マウス移動への遅延追従）
                container.position.x += (targetX - container.position.x) * 0.1;
                container.position.y += (-targetY - container.position.y) * 0.1;
                container.rotation.z += (targetX * 0.5 - container.rotation.z) * 0.1;

                // 2. ボビング（移動中の揺れ）
                if (isMoving) {
                    bobTick += 0.15;
                    container.position.y += Math.sin(bobTick) * 0.005;
                    container.position.x += Math.cos(bobTick * 0.5) * 0.003;
                } else {
                    // アイドル状態の呼吸のような揺れ
                    bobTick += 0.02;
                    container.position.y += Math.sin(bobTick) * 0.001;
                }
            }

            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
